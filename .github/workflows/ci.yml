name: CI

on:
  push:
    branches:
      - "pras75299/initial-feature-setup"
      - "main"
      - "chore/**"
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - "pras75299/initial-feature-setup"
      - "main"

jobs:
  test-and-lint:
    name: Test, Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --dir packages/cli build

      - name: Run CLI tests
        run: pnpm --dir packages/cli test

      - name: Lint docs site
        run: pnpm --dir apps/www lint

      - name: Type-check CLI
        run: pnpm --dir packages/cli exec tsc --noEmit

      - name: Type-check docs site
        run: pnpm --dir apps/www exec tsc --noEmit

      - name: Verify registry.json is up to date
        run: |
          pnpm build:registry
          git diff --exit-code registry.json || (echo "" && echo "ERROR: registry.json is out of sync." && echo "Run 'pnpm build:registry' locally and commit the updated registry.json." && exit 1)
