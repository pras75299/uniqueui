name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish uniqueui-cli
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --dir packages/cli build

      - name: Verify CHANGELOG has release entry
        run: bash scripts/verify-changelog.sh

      # Publish with npm (not pnpm): npm provenance requires npm to pack from
      # source. pnpm packs a tarball first and shells out to `npm publish
      # <tarball> --provenance`, which npm rejects (EUSAGE). cli-core is a
      # bundled devDependency, so no workspace: spec leaks into runtime deps.
      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
